	<script> <!-- pls do not unbox ts is so big the code for flying boxes itadakimasu felix -->
  const images = [
    'index_background/Square_1.png',
    'index_background/Square_2.png',
    'index_background/Square_3.png'
  ];

  const background = document.querySelector('.background');
  const placed = [];
  const targetCount = Math.floor(Math.random() * 4) + 5; // random between 5 and 8

  function overlaps(x, y, size) {
    for (const p of placed) {
      const dx = x - p.x;
      const dy = y - p.y;
      const distance = Math.sqrt(dx * dx + dy * dy);
      if (distance < (size + p.size) / 6) return true;
    }
    return false;
  }

  let count = 0;
  let attempts = 0;

  while (count < targetCount && attempts < 1000) {
    attempts++;

    const size = Math.random() * 80 + 50;
    const x = Math.random() * 90;
    const y = Math.random() * 90;

    if (overlaps(x, y, size)) continue;

    placed.push({ x, y, size });

    const img = document.createElement('img');
    img.src = images[Math.floor(Math.random() * images.length)];
    img.classList.add('floating-shape');

    const angle = Math.random() * 360;
    const opacity = Math.random() * 0.5 + 0.4;

    img.style.cssText = `
      width: ${size}px;
      height: ${size}px;
      left: ${x}%;
      top: ${y}%;
      transform: rotate(${angle}deg);
      opacity: ${opacity};
      mix-blend-mode: screen;
    `;

    background.appendChild(img);
    count++;
  }
</script>

<div class="box">
  <h3>Depression Levels</h3>
  <p>Mental health concern</p>

  <!-- The blank paper Chart.js will draw on -->
  <canvas id="depressionChart" height="200"></canvas>
</div>

<script>
  // ============================================================
  // STEP 1: RAW SURVEY DATA
  // This is every single person's answer from the study.
  // Each number is one person's score: 1=Never, 2=Rarely,
  // 3=Sometimes, 4=Often, 5=Always
  // ============================================================
  const rawData = [
    5,5,4,4,4,3,5,5,5,1,5,3,3,3,5,3,4,2,3,2,2,3,4,4,3,4,4,4,4,5,5,3,2,3,5,4,3,5,2,1,
    3,4,2,5,3,3,1,3,2,1,3,3,5,1,1,5,3,4,5,1,4,4,5,5,1,2,4,4,4,3,1,5,4,2,5,2,5,4,5,5,
    4,1,4,4,2,4,2,1,3,5,4,4,4,3,4,3,1,4,5,2,3,5,4,3,1,2,3,1,2,3,2,4,2,2,4,2,3,3,5,4,
    1,3,5,4,1,4,4,4,4,3,1,3,3,2,2,4,1,1,3,4,1,3,4,2,5,3,4,2,2,2,2,1,2,3,4,3,2,1,4,4,
    2,1,3,3,3,2,2,2,1,2,3,3,5,3,4,1,1,4,3,4,4,3,1,5,3,2,3,3,4,2,4,4,4,5,4,1,3,2,1,1,
    2,3,3,3,5,2,1,5,1,4,3,1,5,1,4,3,1,2,5,2,3,2,3,3,4,2,4,2,1,4,4,1,5,1,4,4,2,5,5,4,
    4,2,3,3,3,4,4,2,1,4,1,5,5,2,2,3,5,1,4,3,2,5,3,3,2,3,2,4,3,3,2,5,3,5,3,5,5,5,5,5,
    3,4,2,5,4,3,2,5,4,3,3,4,4,5,1,2,4,4,3,5,5,5,4,4,3,3,5,1,2,2,5,3,2,5,4,3,3,5,5,5,
    5,4,3,2,5,5,5,5,4,4,1,4,3,5,3,4,1,4,3,5,3,3,5,2,5,5,1,4,3,5,4,3,3,5,2,3,4,3,3,4,
    3,2,4,2,1,5,4,5,1,5,2,4,3,3,2,5,5,4,5,1,5,5,4,5,3,2,3,2,4,4,3,5,5,5,2,2,5,5,1,5,
    4,3,3,1,1,5,5,4,4,4,3,3,5,5,4,5,2,3,4,3,3,2,5,4,1,4,3,4,3,5,5,5,5,5,4,3,3,2,2,4,
    2,1,3,4,3,3,5,5,4,2,2,4,3,1,3,1,1,2,4,2,1,3,5,3,2,2,3,1,5,1,5,4,2,4,4,5,3,4,2,4,2
  ];

  // ============================================================
  // STEP 2: COUNT HOW MANY PEOPLE CHOSE EACH SCORE (1 through 5)
  // We make an empty scoreboard [0, 0, 0, 0, 0] for scores 1–5,
  // then loop through every answer and add 1 to the right slot.
  //
  // Example: if someone answered 3, we do scoreboard[2]++
  // (we use v-1 because arrays start at 0, not 1)
  // ============================================================
  const scoreboard = [0, 0, 0, 0, 0]; // slots for score 1, 2, 3, 4, 5

  rawData.forEach(v => {
    scoreboard[v - 1]++; // v=1 → slot 0, v=2 → slot 1, etc.
  });

  // scoreboard now looks something like: [45, 60, 110, 140, 125]

  // ============================================================
  // STEP 3: LABELS FOR THE X AXIS
  // These are the human-readable names for each score value.
  // ============================================================
  const labels = ['Never', 'Rarely', 'Sometimes', 'Often', 'Always'];

  // ============================================================
  // STEP 4: COLOURS FOR EACH BAR
  // We use 5 shades going from dark burnt red → bright orange,
  // representing the escalating severity of depression responses.
  // ============================================================
  const barColors = ['#7c2d12', '#9a3412', '#c2410c', '#ea580c', '#f97316'];

  // ============================================================
  // STEP 5: DRAW THE CHART
  // ============================================================
  new Chart('depressionChart', {
    type: 'bar', // vertical bars (no indexAxis flip this time)

    data: {
      labels: labels,        // x axis: Never, Rarely, Sometimes, Often, Always
      datasets: [{
        data: scoreboard,    // y axis: the counts we calculated above
        backgroundColor: barColors,
        borderRadius: 8,     // rounded bar tops
        borderWidth: 0,      // no outline on bars
      }]
    },

    options: {
      responsive: true,
      maintainAspectRatio: false,

      scales: {
        x: {
          ticks: { color: '#888' },
          grid:  { display: false }, // hide vertical grid lines — cleaner look
        },
        y: {
          ticks: { color: '#888' },
          grid:  { color: '#2e2e2e' }, // subtle horizontal grid lines
        }
      },

      plugins: {
        legend: { display: false } // no legend — bars are self-labelled on x axis
      }
    }
  });
</script>
